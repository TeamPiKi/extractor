# 컨텍스트 로딩만 통과시키기 위한 더미 fallback (PIKI-Server 의 src/test/resources/application.yml 과 같은 패턴).
# 실제 Gemini 호출 테스트(E2E)는 @EnabledIfEnvironmentVariable / @Disabled 로 격리되어 있으므로
# CI 에서 GEMINI_API_KEY 가 없어도 컨텍스트 로딩 자체는 깨지지 않는다.
gemini:
  api-key: ${GEMINI_API_KEY:test-dummy-key}
  # model 미지정 → GeminiProperties.DEFAULT_MODEL 적용. 테스트는 외부 호출을 stub 하므로 모델 문자열은 실제로 쓰이지 않는다.
